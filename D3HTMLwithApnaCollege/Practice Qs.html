<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <table border="2">
    <thead>
      <caption>A test table with merged cells</caption>
      <tr>
        <th rowspan="2" scope="col"> &nbsp;</th>
        <th colspan="2" scope="col">Average</th>
        <th rowspan="2" scope="col">Red Eyes</th>
      </tr>
      <tr>
        <th scope="col">Height</th>
        <th scope="col">Weight</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td scope="row">Male</td>
        <td>1.9</td>
        <td>0.003</td>
        <td>40 &percnt;</td>
      </tr>
      <tr>
        <td scope="row">Female</td>
        <td>1.7</td>
        <td>0.002</td>
        <td>43 &percnt;</td>
      </tr>
      <tbody>

      </tbody>
    </tbody>
  </table>
</body>
</html>
