<html lang="en">
<head>

</head>
<body>
  <form action="/action">
    <div>
      <label for="username"> Username : </label>
      <input 
      type="text" 
      id="username" 
      name="username"
      placeholder="Enter Username"
      >
    </div>
    <div>
      <label for="password"> Password :</label>
      <input 
      type="password"
      id="password"
      name="password"
      placeholder="Enter Password">
    </div>
  </form>
  <br>
  <hr><hr>
  <form action="https://www.youtube.com/results?">
  <label for="search_">Search On YouTube</label>
  <input type="text" name="search_query" id="search_" placeholder="Search On YouTube">
  <button type="submit">Submit</button>
  </form>
</body>
</html>
