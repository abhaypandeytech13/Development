<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form action="/server">
      <label for="username">Username : </label>
      <input type="text" id="username" name="username" placeholder=" Enter Name ">
    <br><br>
      <label for="sex">Sex</label>
      <label for="male"><input type="radio" name="Gen" id="male">Male</label>
      <label for="female"><input type="radio" name="Gen" id="female">Female</label>
    <br><br>
      <label for="country">Country :</label>
      <select name="country" id="country">
        <option value="Indai">India</option>
        <option value="Nepal">Nepal</option>
        <option value="USA">USA</option>
        <option value="Canada">Canada</option>
      </select>
    <br><br>
      <label for="message">Message : </label><br>
      <textarea name="message" id="message" cols="30" rows="4"></textarea> 
    <br><br>
    <input type="checkbox" name="newsletter" id="newsletter" >
    <label for="newsletter">Subscriber : </label>
    <br><br>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
