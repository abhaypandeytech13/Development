<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form action="/submit" method="POST" novalidate>
    <fieldset>
      <legend>Personal Information</legend>
  
      <div class="form-group">
        <label for="full-name">Full name <span aria-hidden="true">*</span></label>
        <input type="text" id="full-name" name="fullName" required autocomplete="name" aria-required="true"
          aria-describedby="name-hint">
        <span id="name-hint">Enter your name as it appears on official documents</span>
      </div>
  
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
  
      <fieldset>
        <legend>Preferred contact method</legend>
        <label><input type="radio" name="contact" value="email"> Email</label>
        <label><input type="radio" name="contact" value="phone"> Phone</label>
      </fieldset>
  
    </fieldset>
  
    <button type="submit">Submit form</button>
  </form>
</body>
</html>
